services:
  - type: web
    name: abayride-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CHAPA_SECRET_KEY
        sync: false
      - key: CHAPA_BASE_URL
        value: https://api.chapa.co/v1
      - key: CHAPA_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_SUCCESS_URL
        value: https://abayride-backend.onrender.com
      - key: ALLOWED_ORIGIN
        sync: false
